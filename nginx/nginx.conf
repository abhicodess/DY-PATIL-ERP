user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Nginx-level rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/s;

    # Upstream load balancer with least_conn algorithm across 3 app instances
    upstream flask_app {
        least_conn;
        server app1:8000 weight=1;
        server app2:8000 weight=1;
        server app3:8000 weight=1;
        keepalive 32;
    }

    # Redirect non-www root to register page
    server {
        listen 80;
        server_name yourerp.com www.yourerp.com;
        return 301 http://www.yourerp.com/register;
    }

    # Main multi-tenant server block listening on port 80
    server {
        listen 80;
        server_name *.yourerp.com erp.dypatil.edu localhost;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10M;

        # Aggressive Gzip Compression for REST responses
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_proxied any;
        gzip_comp_level 6;

        # Serve React frontend build files
        root /usr/share/nginx/html;
        index index.html;

        # Serve static assets (React bundle) with aggressive caching
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache" always;
        }

        # Cache hashed production bundles
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        # Serve static files directly from Nginx (bypasses Flask completely)
        location /static/ {
            root /app;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Secure serving of isolated tenant uploads (internal redirect only)
        location ~ ^/uploads/([a-z0-9_]+)/(.+)$ {
            alias /app/uploads/$1/$2;
            internal;
        }

        # Proxy API, Auth, Admin, etc. requests to Gunicorn backend instances
        location ~ ^/(api|auth|admin|attendance|results|timetable|students|faculty|reports|hr|admissions|exams)/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;     # CRITICAL: pass subdomain to Flask
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Socket.io WebSocket connections
        location /socket.io/ {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Custom Error Pages
        error_page 502 503 504 /custom_50x.html;
        location = /custom_50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
