
{% extends "common/base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div style="text-align:center; padding:100px 20px;" class="fu">
  <div style="font-size:120px; font-weight:800; color:var(--bg2); line-height:1">500</div>
  <div class="ph-title" style="margin-top:-40px">Something Went Wrong</div>
  <p class="ph-sub" style="margin-top:10px">An internal server error occurred. Our team has been notified.</p>
  <div style="margin-top:30px">
    <button onclick="location.reload()" class="btn btn-dark"><i class="fas fa-rotate"></i> Try Again</button>
    <a href="/" class="btn btn-out">Home</a>
  </div>
</div>
{% endblock %}
