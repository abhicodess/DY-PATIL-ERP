<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Attendance Portal | CloudMark</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #F8F9FC; font-family: 'Inter', sans-serif; overflow: hidden; }
        #root { height: 100vh; width: 100vw; }
        .loader-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #6366F1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    {% raw %}
    <div id="root">
        <div class="loader-wrap">
            <div class="spinner"></div>
            <p style="color: #6B7280; font-weight: 500;">Initializing Academic Infrastructure...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LayoutDashboard, UserCheck, Users, BarChart3, Bell, Settings, LogOut, 
            Search, ChevronRight, CheckCircle2, Clock, AlertCircle, BookOpen, 
            Smartphone, Moon, Sun, FileText 
        } = lucide;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, 
            ResponsiveContainer 
        } = Recharts;

        const MOCK_FACULTY = { id: 'fac_101', name: 'Dr. Priya Sharma', email: 'priya@dypatil.edu', dept: 'Computer Science', role: 'Faculty', avatar: 'PS' };
        const SUBJECTS = [
            { id: 'CS301', name: 'Data Structures', batch: 'CS-2023-A', section: 'III-A' },
            { id: 'CS302', name: 'DBMS', batch: 'CS-2023-A', section: 'III-A' },
            { id: 'CS303', name: 'Operating Systems', batch: 'CS-2023-B', section: 'III-B' }
        ];

        const GENERATE_STUDENTS = (prefix, count) => Array.from({ length: count }, (_, i) => ({
            id: `${prefix}${23001 + i}`,
            roll: `${prefix}${23001 + i}`,
            name: ['Aarav Patel', 'Ishani Gupta', 'Rohan Mehra', 'Sanya Iyer', 'Vikram Singh', 'Ananya Reddy'][i % 6],
            batch: prefix.includes('A') ? 'CS-2023-A' : 'CS-2023-B',
            attendance: Math.floor(Math.random() * 40 + 60),
            status: 'Present'
        }));
        const STUDENTS_A = GENERATE_STUDENTS('CS-A', 30);
        const STUDENTS_B = GENERATE_STUDENTS('CS-B', 28);

        const CSS_VARIABLES = `
            :root { --primary: #6366F1; --bg: #F8F9FC; --card-bg: #FFFFFF; --sidebar-bg: #FFFFFF; --text-primary: #111827; --text-secondary: #6B7280; --text-muted: #9CA3AF; --border: #E5E7EB; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; --info: #3B82F6; --radius: 12px; }
            .dark { --bg: #0F0F13; --card-bg: #1A1A24; --sidebar-bg: #1A1A24; --text-primary: #F3F4F6; --text-secondary: #9CA3AF; --border: #2D2D3D; }
            * { box-sizing: border-box; }
            .app-container { display: flex; min-height: 100vh; color: var(--text-primary); }
            .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); overflow-y: auto; }
            .sidebar-header { padding: 30px; display: flex; align-items: center; gap: 12px; }
            .logo-box { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
            .nav-item { padding: 12px 24px; margin: 0 12px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text-secondary); transition: 0.2s; font-size: 14px; }
            .nav-item.active { background: #F5F3FF; color: var(--primary); font-weight: 600; }
            .main-content { flex: 1; height: 100vh; overflow-y: auto; background: var(--bg); }
            .header { height: 72px; padding: 0 40px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
            .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
            .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 30px; }
            .button { height: 44px; padding: 0 20px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
            .button-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
            .roster-table { width: 100%; border-collapse: collapse; }
            .roster-table th { text-align: left; padding: 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 12px; }
            .roster-table td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
            .avatar { width: 32px; height: 32px; border-radius: 8px; background: #E5E7EB; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #4B5563; }
            .status-chip { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #ECFDF5; color: #10B981; }
            .status-Absent { background: #FEF2F2; color: #EF4444; }
            .status-toggle { display: flex; background: #F4F6FA; border-radius: 8px; padding: 3px; gap: 3px; }
            .toggle-btn { height: 28px; width: 34px; border-radius: 6px; border: none; cursor: pointer; font-size: 10px; font-weight: 700; color: #9CA3AF; background: transparent; }
            .toggle-btn.active.P { background: #10B981; color: white; }
            .toggle-btn.active.A { background: #EF4444; color: white; }
        `;

        function App() {
            const [view, setView] = useState('dashboard');
            const [darkMode, setDarkMode] = useState(false);
            const [isLogged, setIsLogged] = useState(false);
            const [selectedSub, setSelectedSub] = useState('');
            const [roster, setRoster] = useState([]);

            const handleLogin = (e) => { e.preventDefault(); setIsLogged(true); };

            const handleSubSelect = (id) => {
                setSelectedSub(id);
                setRoster((id.includes('CS303') ? STUDENTS_B : STUDENTS_A).map(s => ({...s, status: 'Present'})));
            };

            if (!isLogged) {
                return (
                    <div style={{ height: '100vh', display: 'flex', alignItems: 'center', justify-content: 'center', background: '#F8F9FC' }}>
                        <style>{CSS_VARIABLES}</style>
                        <form onSubmit={handleLogin} style={{ width: '360px', background: 'white', padding: '40px', borderRadius: '20px', border: '1px solid #E5E7EB' }}>
                            <div className="logo-box" style={{ margin: '0 auto 20px', width: '48px', height: '48px' }}><BookOpen /></div>
                            <h2 style={{ textAlign: 'center', marginBottom: '30px', fontWeight: 800 }}>Faculty Access</h2>
                            <label style={{ fontSize: '12px', fontWeight: 600, color: '#6B7280', display: 'block', marginBottom: '8px' }}>Institutional Email</label>
                            <input type="email" style={{ width: '100%', height: '44px', border: '1px solid #E5E7EB', borderRadius: '10px', marginBottom: '20px', padding: '0 15px' }} defaultValue="priya@dypatil.edu" />
                            <label style={{ fontSize: '12px', fontWeight: 600, color: '#6B7280', display: 'block', marginBottom: '8px' }}>Security Key</label>
                            <input type="password" style={{ width: '100%', height: '44px', border: '1px solid #E5E7EB', borderRadius: '10px', marginBottom: '30px', padding: '0 15px' }} defaultValue="admin123" />
                            <button className="button" style={{ width: '100%', height: '48px' }}>Authorize Session</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className={`app-container ${darkMode ? 'dark' : ''}`}>
                    <style>{CSS_VARIABLES}</style>
                    <aside className="sidebar">
                        <div className="sidebar-header">
                            <div className="logo-box"><Smartphone size={18} /></div>
                            <span style={{ fontWeight: 800, fontSize: '18px' }}>CloudMark</span>
                        </div>
                        <div className={`nav-item ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}><LayoutDashboard size={18} /> Dashboard</div>
                        <div className={`nav-item ${view === 'attendance' ? 'active' : ''}`} onClick={() => setView('attendance')}><UserCheck size={18} /> Attendance</div>
                        <div className="nav-item"><Users size={18} /> Student Roster</div>
                        <div style={{ marginTop: 'auto', padding: '30px', margin: '20px', background: '#F5F3FF', borderRadius: '12px', textAlign: 'center' }}>
                            <p style={{ fontSize: '11px', fontWeight: 700, color: '#6366F1' }}>ACADEMIC WEEK 12</p>
                        </div>
                    </aside>

                    <main className="main-content">
                        <header className="header">
                            <h2 style={{ fontSize: '18px', fontWeight: 600 }}>{view === 'dashboard' ? 'Overview' : 'Mark Attendance'}</h2>
                            <div style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
                                <div style={{ textAlign: 'right' }}>
                                    <div style={{ fontSize: '13px', fontWeight: 700 }}>Dr. Priya Sharma</div>
                                    <div style={{ fontSize: '10px', color: '#9CA3AF' }}>CS Department Head</div>
                                </div>
                                <div className="avatar" style={{ background: '#6366F1', color: 'white' }}>PS</div>
                            </div>
                        </header>

                        <div style={{ padding: '40px' }}>
                            {view === 'dashboard' ? (
                                <div>
                                    <h1 style={{ marginBottom: '8px' }}>Good morning, Priya 👋</h1>
                                    <p style={{ color: '#6B7280', marginBottom: '30px' }}>Operational metrics for Semester III • Term Oct 24</p>
                                    <div className="stats-grid">
                                        <Card><div style={{ color: '#9CA3AF', fontSize: '12px' }}>Total Students</div><div style={{ fontSize: '24px', fontWeight: 800 }}>58</div></Card>
                                        <Card><div style={{ color: '#9CA3AF', fontSize: '12px' }}>Avg Attendance</div><div style={{ fontSize: '24px', fontWeight: 800 }}>92.4%</div></Card>
                                        <Card><div style={{ color: '#9CA3AF', fontSize: '12px' }}>Active Batch</div><div style={{ fontSize: '24px', fontWeight: 800 }}>CS-A</div></Card>
                                        <Card><div style={{ color: '#9CA3AF', fontSize: '12px' }}>Defaulters</div><div style={{ fontSize: '24px', fontWeight: 800, color: '#EF4444' }}>4</div></Card>
                                    </div>
                                    <Card style={{ height: '350px' }}>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={[{d:'Mon',v:90},{d:'Tue',v:85},{d:'Wed',v:92},{d:'Thu',v:94},{d:'Fri',v:88}]}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="d" axisLine={false} tickLine={false} />
                                                <YAxis axisLine={false} tickLine={false} />
                                                <Bar dataKey="v" fill="#6366F1" radius={[4,4,0,0]} barSize={40} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </Card>
                                </div>
                            ) : (
                                <div>
                                    <div className="card" style={{ marginBottom: '24px', display: 'flex', gap: '20px' }}>
                                        <select className="button button-ghost" style={{ flex: 1, textAlign: 'left' }} onChange={e => handleSubSelect(e.target.value)}>
                                            <option>Select Subject...</option>
                                            {SUBJECTS.map(s => <option key={s.id} value={s.id}>{s.name} ({s.id})</option>)}
                                        </select>
                                        <input type="date" className="button button-ghost" />
                                        <button className="button">Apply Filter</button>
                                    </div>

                                    <Card style={{ padding: 0 }}>
                                        <table className="roster-table">
                                            <thead><tr><th>Student Name</th><th>Roll No</th><th>Status</th><th style={{ textAlign: 'center' }}>Action</th></tr></thead>
                                            <tbody>
                                                {roster.map(s => (
                                                    <tr key={s.id}>
                                                        <td><div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}><div className="avatar">{s.name[0]}</div>{s.name}</div></td>
                                                        <td style={{ color: '#9CA3AF' }}>{s.roll}</td>
                                                        <td><div className={`status-chip status-${s.status}`}>{s.status}</div></td>
                                                        <td>
                                                            <div style={{ display: 'flex', justifyContent: 'center' }}>
                                                                <div className="status-toggle">
                                                                    <button className={`toggle-btn ${s.status === 'Present' ? 'active P' : ''}`} onClick={() => setRoster(r => r.map(st => st.id === s.id ? {...st, status: 'Present'} : st))}>P</button>
                                                                    <button className={`toggle-btn ${s.status === 'Absent' ? 'active A' : ''}`} onClick={() => setRoster(r => r.map(st => st.id === s.id ? {...st, status: 'Absent'} : st))}>A</button>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </Card>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    {% endraw %}
</body>
</html>
