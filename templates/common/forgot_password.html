<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — DY Patil ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Plus Jakarta Sans',sans-serif;background:#F4F6FA;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:420px;padding:36px}
.logo{font-size:20px;font-weight:700;color:#111827;margin-bottom:6px}
.sub{font-size:13px;color:#6B7280;margin-bottom:28px}
.fg{margin-bottom:16px}.fg label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.fg input,.fg select{width:100%;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.btn{width:100%;padding:11px;background:#111827;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px}
.btn:hover{background:#2563EB}
.msg{background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:14px;font-size:13px;color:#065f46;margin-bottom:16px;font-family:monospace;font-weight:600;font-size:15px;text-align:center;letter-spacing:.05em}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:12px;font-size:13px;color:#991b1b;margin-bottom:16px}
.link{display:block;text-align:center;margin-top:16px;font-size:12px;color:#6B7280}
.link a{color:#2563EB;text-decoration:none;font-weight:600}.link a:hover{text-decoration:underline}
</style></head><body>
<div class="box">
  <div class="logo"><i class="fas fa-key" style="color:#2563EB;margin-right:8px"></i>Reset Password</div>
  <div class="sub">Enter your role and login ID to get a reset code.</div>
  {% if msg %}<div class="msg"><i class="fas fa-check-circle"></i> {{ msg }}</div>
    <a href="/reset_password?role={{ request.form.role }}&ident={{ request.form.identifier }}" class="btn" style="display:block;text-align:center;text-decoration:none;padding:11px">Enter Reset Code →</a>
  {% else %}
  {% if err %}<div class="err"><i class="fas fa-exclamation-circle"></i> {{ err }}</div>{% endif %}
  <form method="POST">
    <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
    <div class="fg"><label>Role</label>
      <select name="role"><option value="student">Student</option><option value="faculty">Faculty</option></select>
    </div>
    <div class="fg"><label>PRN Number (students) / Email (faculty)</label>
      <input type="text" name="identifier" placeholder="Your roll no. or email" required>
    </div>
    <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Get Reset Code</button>
  </form>
  {% endif %}
  <div class="link"><a href="/login">← Back to login</a></div>
</div></body></html>
