{% extends "common/base.html" %}
{% block content %}
<div class="container" style="padding-top: 100px; text-align: center;">
    <div style="background: rgba(255,255,255,0.05); padding: 50px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); max-width: 600px; margin: 0 auto;">
        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: #ff4757; margin-bottom: 24px;"></i>
        <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 16px;">System Exception Detected</h1>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 32px; line-height: 1.6;">
            The analytics engine encountered a fault during processing. This has been logged for architectural review.
        </p>
        
        {% if error %}
        <div style="background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: left; margin-bottom: 32px; border-left: 4px solid #ff4757; overflow-x: auto;">
            <code style="color: #ff4757;">Error Trace ID:</code><br>
            <span style="opacity: 0.8;">{{ error }}</span>
        </div>
        {% endif %}

        <div style="display: flex; gap: 12px; justify-content: center;">
            <a href="/" class="btn btn-dark" style="border-radius: 12px; padding: 12px 24px;">Return to Command</a>
            <button onclick="window.location.reload()" class="btn btn-dark" style="background: rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 24px;">Retry Sync</button>
        </div>
    </div>
</div>
{% endblock %}
