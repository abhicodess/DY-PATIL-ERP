services:
  # Web Service running Gunicorn
  - type: web
    name: college-erp
    runtime: docker
    plan: free
    region: singapore
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: erp-redis
          type: redis
          property: connectionString
      - fromGroup: college-erp-env

  # Celery Background Worker
  - type: worker
    name: college-erp-worker
    runtime: docker
    plan: free # Note: Render worker plans may require paid tiers in some accounts
    region: singapore
    branch: main
    dockerCommand: celery -A celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: erp-redis
          type: redis
          property: connectionString
      - fromGroup: college-erp-env

  # Redis instance for Celery and Rate Limiting
  - type: redis
    name: erp-redis
    plan: free
    region: singapore
    ipAllowList: [] # Only accessible internally by services in this Blueprint

databases:
  # PostgreSQL database
  - name: erp-db
    plan: free
    region: singapore
