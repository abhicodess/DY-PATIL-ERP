groups:
  - name: erp_alerts
    rules:
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time (p95 > 2s)"

      - alert: HighErrorRate
        expr: sum(rate(flask_http_request_total{status=~"5.."}[5m])) / sum(rate(flask_http_request_total[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 1%"

      - alert: DBPoolExhaustion
        expr: pg_stat_activity_count > 160
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool > 80% utilized"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 80%"

      - alert: CeleryQueueBacklog
        expr: celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery queue depth > 100"
