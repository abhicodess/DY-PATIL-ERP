[databases]
* = host=db port=5432 auth_user=erp_admin

[pgbouncer]
listen_addr = *
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool configuration
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_command_timeout = 5

# Performance Tuning
tcp_keepalive = 1
tcp_keepidle = 65
tcp_keepintvl = 10
tcp_keepcnt = 5

# Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

# Timeouts
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15
query_timeout = 30
